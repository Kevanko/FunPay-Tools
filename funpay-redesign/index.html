<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FunPay Tools — Redesign</title>

<!-- Fonts: Geist (Suisse-like), Space Grotesk, Clash Display, mono -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500;600&family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&family=Syne:wght@500;600;700;800&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<link href="https://api.fontshare.com/v2/css?f[]=clash-display@500,600,700&display=swap" rel="stylesheet">

<!-- Lucide icon data (thin line icons) -->
<script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.js"></script>

<!-- React + Babel (pinned) -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<link rel="stylesheet" href="tokens.css">
<link rel="stylesheet" href="components.css">
<link rel="stylesheet" href="screens.css">
<link rel="stylesheet" href="fptools.css">
<link rel="stylesheet" href="lots.css">
<link rel="stylesheet" href="logo.css">
<link rel="stylesheet" href="chrome.css">

<style>
  html, body { margin: 0; padding: 0; background: #0e0f12; }
  .fpx-root { min-height: 100vh; }
  /* hide tweaks/app until babel compiles to avoid FOUC of raw text */
  #root:empty::before {
    content: ""; position: fixed; inset: 0; background: #0e0f12;
  }
</style>
</head>
<body>
<div class="fpx-root" data-theme="graphite" data-density="regular">
  <div id="root"></div>
</div>

<script type="text/babel" src="icons.jsx"></script>
<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="shell.jsx"></script>
<script type="text/babel" src="home.jsx"></script>
<script type="text/babel" src="fptools.jsx"></script>
<script type="text/babel" src="lots.jsx"></script>
<script type="text/babel" src="logo.jsx"></script>
<script type="text/babel" src="app.jsx"></script>
<script type="text/babel" data-presets="react">
  const mount = () => {
    if (!window.FPXApp) { setTimeout(mount, 30); return; }
    ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(window.FPXApp));
  };
  mount();
</script>

<template id="__bundler_thumbnail">
  <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <rect width="100" height="100" fill="#16181d"/>
    <rect x="30" y="30" width="40" height="40" rx="10" fill="#5b86d8"/>
    <text x="50" y="57" font-family="monospace" font-size="20" font-weight="700" fill="#0b0d10" text-anchor="middle">FP</text>
  </svg>
</template>
</body>
</html>
