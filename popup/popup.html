<!DOCTYPE html>
<html lang="ru" data-theme="graphite">
<head>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="fpt-window" id="app">

    <!-- Titlebar -->
    <div class="fpt-titlebar">
      <div class="fpt-titlebar-l">
        <span class="fp-mark"><span>F</span><span>P</span></span>
        <span class="fpt-titlebar-name">FP Tools</span>
        <span class="badge badge-muted" id="version-badge">v2.8</span>
      </div>
      <div class="fpt-titlebar-r">
        <div class="fpt-status-wrap">
          <span class="fpt-sdot" id="status-dot"></span>
          <span class="fpt-sdot-label" id="status-label">Проверка…</span>
        </div>
        <button class="btn btn-soft btn-sm" id="open-funpay-btn">
          Открыть FunPay
        </button>
        <div class="fpt-divider-v"></div>
        <a class="btn btn-quiet btn-sm btn-icon" id="telegram-btn" href="#" title="Telegram-сообщество"></a>
      </div>
    </div>

    <!-- Body: nav + content -->
    <div class="fpt-main">
      <nav class="fpt-nav fpx-scroll" id="fpt-nav">
        <div class="fpt-search" id="search-wrap">
          <span class="search-ic" id="search-icon-slot"></span>
          <input class="fpt-search-input" type="text" placeholder="Поиск по функциям" id="nav-search" autocomplete="off" spellcheck="false">
        </div>
        <div id="nav-groups"></div>
      </nav>
      <main class="fpt-content fpx-scroll" id="fpt-content"></main>
    </div>

  </div>
  <script src="popup.js"></script>
</body>
</html>
